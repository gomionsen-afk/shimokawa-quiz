<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== 探偵ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  width:140px;
  padding:12px;
  background:linear-gradient(#2b1a12,#120c08);
  color:#eee;
  border:2px solid #5a2a1a;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.8),
             inset 0 0 10px rgba(255,255,255,0.05);
  font-family:"Yu Mincho",serif;
  z-index:9999;
}

#rankName{
  font-size:14px;
  color:#ff4444;
  font-weight:bold;
  letter-spacing:1px;
  text-shadow:0 0 5px rgba(255,0,0,0.5);
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#111;
  border:1px solid #333;
  border-radius:5px;
  margin:6px 0;
}

.rank-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#550000,#ff4444);
  box-shadow:0 0 8px rgba(255,0,0,0.6);
  transition:0.3s;
}

#rankText{
  font-size:11px;
  color:#ccc;
}

.rank-up-effect{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,0,0,0); }
  50%{ box-shadow:0 0 20px rgba(255,0,0,0.8); }
  100%{ box-shadow:0 0 0 rgba(255,0,0,0); }
}

/* ===== UI ===== */
.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

/* 選択肢 */
.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

/* 解説 */
.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
  border-left:5px solid #ff4444;
  text-align:left;
}

/* 結果 */
.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
}

.rank{ font-size:24px; color:#ff4444; }

.timer{ color:red; font-size:22px; }

/* WARNING */
body.alert{
  animation: flashBg 0.5s infinite;
}
@keyframes flashBg{
  0%{ background:#200; }
  50%{ background:#800; }
  100%{ background:#200; }
}

.warning{
  font-size:28px;
  color:red;
  animation: blink 0.8s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* 手紙 */
.letter{
  width:280px;
  margin:30px auto;
  padding:20px;
  background:#fdf5e6;
  color:#111;
  border:2px solid #8b0000;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "（そのまま）";
const extraUrl = "（そのまま）";

/* ===== ランク ===== */
let totalCorrect = Number(localStorage.getItem("totalCorrect") || 0);
let playerRank = Number(localStorage.getItem("playerRank") || 1);
let currentExp = Number(localStorage.getItem("currentExp") || 0);

function getRequiredExp(rank){
  return 9 + rank;
}

function updateRankUI(){
  const required = getRequiredExp(playerRank);
  document.getElementById("rankName").innerText = "RANK " + playerRank;
  document.getElementById("rankText").innerText = currentExp + " / " + required;
  document.getElementById("rankBar").style.width =
    (currentExp / required) * 100 + "%";
}

function addExp(){
  currentExp++;
  totalCorrect++;

  let required = getRequiredExp(playerRank);

  if(currentExp >= required){
    currentExp = 0;
    playerRank++;

    const ui = document.getElementById("rankUI");
    ui.classList.add("rank-up-effect");
    setTimeout(()=>ui.classList.remove("rank-up-effect"),1000);

    document.getElementById("quiz").innerHTML +=
      "<p style='color:gold;'>✨ RANK UP!! ✨</p>";
  }

  localStorage.setItem("totalCorrect", totalCorrect);
  localStorage.setItem("playerRank", playerRank);
  localStorage.setItem("currentExp", currentExp);

  updateRankUI();
}

/* ===== クイズ部分（今のままでOK） ===== */
/* ※あなたの既存コードそのまま貼ればOK */

updateRankUI();
</script>

</body>
</html>
