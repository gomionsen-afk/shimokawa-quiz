<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- ★ モバイル最適化 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ごみおんせん推理録</title>

<style>
body{
  font-family:
    "DFKyougekiTai",
    "秀英アンチック",
    "Hiragino Mincho ProN",
    "Yu Mincho",
    serif;

  background:
    linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
    url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");

  color:#fff;
  text-align:center;
  padding:15px;
  margin:0;
}

/* タイトル */
h1{
  font-size:24px;
  letter-spacing:2px;
}

/* ゲージ */
.gauge-wrap{
  width:100%;
  max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  overflow:hidden;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
  transition:0.4s;
}

/* カード */
.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
  border:3px solid #3b2a1a;
}

/* ボタン */
button{
  display:block;
  width:100%;
  margin:8px 0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:5px;
  background:#2f2f2f;
  color:#fff;
}

button:hover{
  background:#8b0000;
}

/* 正解 */
.big-circle{
  width:100px;
  height:100px;
  border-radius:50%;
  border:8px solid #b30000;
  margin:10px auto;
}

/* 不正解 */
.big-x{
  font-size:70px;
  color:#555;
}

/* 選択肢 */
.choice{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}
.choice.correct{
  background:#8b0000;
  color:#fff;
}
.choice.wrong{
  background:#777;
  color:#fff;
}

/* ⭐ ランク表示（ここが進化ポイント） */
.result-box{
  padding:20px;
  margin-top:10px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
  border-radius:10px;
  animation:fadeIn 0.5s ease;
}

.rank{
  font-size:28px;
  font-weight:bold;
  color:#ff4444;
  margin-top:10px;
  letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,0,0,0.7);
}

/* アニメーション */
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";

let questions = [];
let current = 0;
let score = 0;

/* CSV */
function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];

    if(char === '"'){
      inQuotes = !inQuotes;
    }else if(char === ',' && !inQuotes){
      row.push(cell);
      cell = "";
    }else if(char === '\n' && !inQuotes){
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    }else{
      cell += char;
    }
  }
  row.push(cell);
  rows.push(row);
  return rows;
}

/* 正規化（最重要） */
function normalize(str){
  return (str || "")
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 65248))
    .trim()
    .toUpperCase();
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows
    .map(c => c.map(v => (v || "").trim()))
    .filter(c => c[0] && c[4])
    .map(c=>{
      return {
        q:c[0],
        choices:[c[1],c[2],c[3]],
        answer: normalize(c[4]),
        explanation:c[5]
      };
    });

  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);

  showQuestion();
});

function updateGauge(){
  const percent = (current / questions.length) * 100;
  document.getElementById("gauge").style.width = percent + "%";
}

function showQuestion(){
  updateGauge();

  const q = questions[current];
  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function answer(a){
  const q = questions[current];
  const user = normalize(a);

  let html = "";

  if(user === q.answer){
    score++;
    html += "<div class='big-circle'></div><h2>正解！</h2>";
  }else{
    html += "<div class='big-x'>×</div><h2>不正解</h2>";
  }

  html += `<p>あなた：${user} ／ 正解：${q.answer}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    let cls = "choice";
    if(l === q.answer) cls += " correct";
    else if(l === user) cls += " wrong";

    html += `<div class="${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<p>${q.explanation}</p>`;
  html += "<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML = html;
}

function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    document.getElementById("gauge").style.width = "100%";

    let rank = "";
    if(score === 10) rank = "名探偵";
    else if(score >= 8) rank = "まあ探偵";
    else if(score >= 5) rank = "眠りの小五郎";
    else if(score >= 3) rank = "・・・・";
    else rank = "気にしないで。";

    document.getElementById("quiz").innerHTML =
      `<div class="result-box">
        <h2>捜査完了</h2>
        <p>${score} / 10</p>
        <div class="rank">${rank}</div>
      </div>`;
  }
}
</script>

</body>
</html>
