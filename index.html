<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ごみおんせん推理録</title>

<style>
body{
  font-family:
    "DFKyougekiTai",
    "秀英アンチック",
    "Hiragino Mincho ProN",
    "Yu Mincho",
    serif;

  background:
    linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
    url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");

  color:#fff;
  text-align:center;
  padding:20px;
}

/* タイトル */
h1{
  font-size:30px;
  letter-spacing:3px;
  text-shadow:2px 2px 5px #000;
}

/* ゲージ */
.gauge-wrap{
  width:100%;
  max-width:420px;
  margin:10px auto;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  height:12px;
}

.gauge{
  height:100%;
  width:0%;
  background:#8b0000;
  transition:0.4s;
}

/* カード */
.card{
  background:#f4f1ea;
  color:#111;
  padding:25px;
  border-radius:5px;
  margin:20px auto;
  max-width:420px;

  border:4px solid #3b2a1a;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* ボタン */
button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:3px;

  background:#2f2f2f;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#8b0000;
  transform:scale(1.04);
}

.next-btn{
  background:#8b0000;
}

/* 赤丸演出 */
.big-circle{
  width:120px;
  height:120px;
  border-radius:50%;
  border:10px solid #b30000;
  margin:10px auto;
  animation:pop 0.3s ease;
}

@keyframes pop{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

/* バツ */
.big-x{
  font-size:80px;
  color:#555;
  animation:pop 0.3s ease;
}

/* 選択肢 */
.choice{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}

.choice.correct{
  background:#8b0000;
  color:#fff;
}

.choice.wrong{
  background:#777;
  color:#fff;
}

</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";

let questions = [];
let current = 0;
let score = 0;

/* CSVパース */
function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];

    if(char === '"'){
      inQuotes = !inQuotes;
    }else if(char === ',' && !inQuotes){
      row.push(cell);
      cell = "";
    }else if(char === '\n' && !inQuotes){
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    }else{
      cell += char;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows.map(c=>{
    return {
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer:(c[4] || "").trim().toUpperCase(),
      explanation:c[5]
    };
  });

  questions = questions.sort(()=>0.5-Math.random()).slice(0,5);
  showQuestion();
});

function updateGauge(){
  const percent = (current / questions.length) * 100;
  document.getElementById("gauge").style.width = percent + "%";
}

function showQuestion(){
  updateGauge();

  const q = questions[current];
  const div = document.getElementById("quiz");

  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  div.innerHTML = html;
}

function answer(a){
  const q = questions[current];
  const div = document.getElementById("quiz");

  const userAnswer = a.trim().toUpperCase();

  let html = "";

  if(userAnswer === q.answer){
    score++;
    html += "<div class='big-circle'></div>";
    html += "<h2 style='color:#b30000;'>正解！</h2>";
  }else{
    html += "<div class='big-x'>×</div>";
    html += "<h2>不正解</h2>";
  }

  html += `<p><b>あなた：</b> ${userAnswer} / <b>正解：</b> ${q.answer}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    let cls = "choice";

    if(l === q.answer){
      cls += " correct";
    }else if(l === userAnswer){
      cls += " wrong";
    }

    html += `<div class="${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<p>${q.explanation}</p>`;
  html += "<button class='next-btn' onclick='next()'>次へ</button>";

  div.innerHTML = html;
}

function next(){
  current++;
  if(current < questions.length){
    showQuestion();
  }else{
    document.getElementById("gauge").style.width = "100%";

    document.getElementById("quiz").innerHTML =
      `<h2>捜査完了</h2>
       <p>${score} / 5 正解</p>
       <p>
       ${score>=4?"名探偵！":
         score>=3?"あと一歩！":
         score>=2?"修行中":
         "再挑戦！"}
       </p>`;
  }
}
</script>

</body>
</html>
