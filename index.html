<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録</title>

<style>
body{
  font-family:
    "DFKyougekiTai",
    "秀英アンチック",
    "Hiragino Mincho ProN",
    "Yu Mincho",
    serif;

  background:
    linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
    url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");

  color:#fff;
  text-align:center;
  padding:15px;
  margin:0;
}

h1{font-size:24px;}

.gauge-wrap{
  max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  overflow:hidden;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
  transition:0.4s;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:5px;
  background:#2f2f2f;
  color:#fff;
}

.big-circle{
  width:100px;
  height:100px;
  border-radius:50%;
  border:8px solid #b30000;
  margin:10px auto;
}

.big-x{
  font-size:70px;
  color:#555;
}

.choice{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}
.choice.correct{background:#8b0000;color:#fff;}
.choice.wrong{background:#777;color:#fff;}

.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  border-radius:10px;
}

.rank{
  font-size:28px;
  color:#ff4444;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";

let questions = [];
let current = 0;
let score = 0;
let isBonus = false;

/* ★ ボーナス問題 */
const bonusQuestion = {
  q: "五味温泉を一言で表すと？",
  choices: ["最高", "神", "五味温泉！！"],
  answer: "C",
  explanation: "ここまで来たあなたは真のファンです。"
};

/* CSV */
function parseCSV(text){
  const rows = [];
  let row=[], cell="", inQuotes=false;

  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c=='"'){inQuotes=!inQuotes;}
    else if(c==','&&!inQuotes){row.push(cell);cell="";}
    else if(c=='\n'&&!inQuotes){row.push(cell);rows.push(row);row=[];cell="";}
    else{cell+=c;}
  }
  row.push(cell); rows.push(row);
  return rows;
}

/* 正規化（最重要） */
function normalize(str){
  return (str||"")
    .replace(/[Ａ-Ｚ]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .trim()
    .toUpperCase();
}

fetch(url)
.then(r=>r.text())
.then(data=>{
  const rows=parseCSV(data).slice(1);

  questions = rows
    .map(c=>c.map(v=>(v||"").trim()))
    .filter(c=>c[0]&&c[4])
    .map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer:normalize(c[4]),
      explanation:c[5]
    }));

  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);
  showQuestion();
});

/* ゲージ */
function updateGauge(){
  document.getElementById("gauge").style.width =
    (current/questions.length*100)+"%";
}

/* 問題表示 */
function showQuestion(){
  updateGauge();

  const q=questions[current];
  let html=`<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html+=`<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;
}

/* 回答 */
function answer(a){
  const q=questions[current];
  const user=normalize(a);

  let html="";

  if(user===q.answer){
    score++;
    html+="<div class='big-circle'></div><h2>正解！</h2>";
  }else{
    html+="<div class='big-x'>×</div><h2>不正解</h2>";
  }

  html+=`<p>あなた：${user} ／ 正解：${q.answer}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    let cls="choice";
    if(l===q.answer) cls+=" correct";
    else if(l===user) cls+=" wrong";
    html+=`<div class="${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html+=`<p>${q.explanation}</p>`;
  html+="<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML=html;
}

/* 次へ */
function next(){
  current++;

  // ★ 全問正解ならボーナス
  if(current===questions.length && score===questions.length && !isBonus){
    isBonus=true;
    showBonus();
    return;
  }

  if(current<questions.length){
    showQuestion();
  }else{
    showResult();
  }
}

/* ★ ボーナス表示 */
function showBonus(){
  let html="<h2>★ 最終問題 ★</h2>";
  html+=`<p>${bonusQuestion.q}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    html+=`<button onclick="answerBonus('${l}')">${bonusQuestion.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;
}

/* ★ ボーナス回答 */
function answerBonus(a){
  let html="";

  if(a===bonusQuestion.answer){
    html+="<div class='big-circle'></div><h2>完全制覇！！</h2>";
    html+="<p>真の名探偵認定</p>";
  }else{
    html+="<div class='big-x'>×</div><h2>惜しい…！</h2>";
  }

  document.getElementById("quiz").innerHTML=html;
}

/* 結果 */
function showResult(){
  document.getElementById("gauge").style.width="100%";

  let rank="";
  if(score===10) rank="名探偵";
  else if(score>=8) rank="まあ探偵";
  else if(score>=5) rank="眠りの小五郎";
  else if(score>=3) rank="・・・・";
  else rank="気にしないで。";

  document.getElementById("quiz").innerHTML=
  `<div class="result-box">
    <h2>捜査完了</h2>
    <p>${score} / 10</p>
    <div class="rank">${rank}</div>
  </div>`;
}
</script>

</body>
</html>
