<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ランクUI */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  padding:10px;
  border-radius:10px;
  width:140px;
  background:#111;
  border:2px solid #fff;
}

/* 色進化 */
.rank-1{border:2px solid #fff;}
.rank-6{border:2px solid #00ff88;}
.rank-16{border:2px solid #00ccff;}
.rank-31{border:2px solid #cc66ff;}
.rank-51{border:2px solid #ffff00;}
.rank-101{border:2px solid #ff8800;}
.rank-151{border:2px solid #ff0000;}
.rank-201{border:3px double gold;}

#rankName{font-weight:bold;}

.rank-bar-wrap{height:8px;background:#444;}
.rank-bar{height:100%;background:#aaa;width:0%;}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  margin:15px auto;
  max-width:420px;
  border-radius:5px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

.explanation-box{
  background:#222;
  color:#fff;
  padding:10px;
  margin-top:10px;
}

.result-box{
  background:#111;
  padding:20px;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";
const extraUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=1390184656&single=true&output=csv";

/* ===== ランク ===== */
let playerRank = Number(localStorage.getItem("playerRank") || 1);
let currentExp = Number(localStorage.getItem("currentExp") || 0);

function getRequiredExp(rank){
  return 9 + rank;
}

function updateRankUI(){
  const required = getRequiredExp(playerRank);
  const ui = document.getElementById("rankUI");

  ui.className = "";
  ui.id = "rankUI";

  if(playerRank>=201) ui.classList.add("rank-201");
  else if(playerRank>=151) ui.classList.add("rank-151");
  else if(playerRank>=101) ui.classList.add("rank-101");
  else if(playerRank>=51) ui.classList.add("rank-51");
  else if(playerRank>=31) ui.classList.add("rank-31");
  else if(playerRank>=16) ui.classList.add("rank-16");
  else if(playerRank>=6) ui.classList.add("rank-6");
  else ui.classList.add("rank-1");

  document.getElementById("rankName").innerText = "RANK " + playerRank;
  document.getElementById("rankText").innerText =
    currentExp + " / " + required;

  document.getElementById("rankBar").style.width =
    (currentExp / required) * 100 + "%";
}

function addExp(amount=1){
  currentExp += amount;

  let required = getRequiredExp(playerRank);

  if(currentExp >= required){
    currentExp = 0;
    playerRank++;
  }

  localStorage.setItem("playerRank", playerRank);
  localStorage.setItem("currentExp", currentExp);

  updateRankUI();
}

/* ===== CSV安全パース ===== */
function parseCSV(text){
  const rows = text.trim().split("\n");
  return rows.map(r=>{
    return r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
  });
}

/* ===== クイズ ===== */
let questions = [];
let current = 0;
let score = 0;

function normalize(str){
  return (str || "").trim().toUpperCase();
}

fetch(url)
.then(r=>r.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows.map(c=>({
    q:c[0],
    choices:[c[1],c[2],c[3]],
    answer: normalize(c[4]),
    explanation:c[5]
  })).filter(q=>q.q && q.answer);

  questions = questions.sort(()=>Math.random()-0.5).slice(0,10);

  updateRankUI();
  showQuestion();
});

function showQuestion(){
  const q = questions[current];

  let html = `<h2>${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function answer(a){
  const q = questions[current];

  if(normalize(a) === q.answer){
    score++;
    addExp(1);
    alert("正解！");
  }else{
    alert("不正解");
  }

  document.getElementById("quiz").innerHTML =
    `<div class="explanation-box">${q.explanation}</div>
     <button onclick="next()">次へ</button>`;
}

function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    endGame();
  }
}

function endGame(){
  document.getElementById("quiz").innerHTML =
  `<div class="result-box">
    ${score}/10 正解
  </div>`;

  if(score===10){
    setTimeout(startExtra,2000);
  }
}

/* ===== エクストラ ===== */
function startExtra(){
  fetch(extraUrl)
  .then(r=>r.text())
  .then(data=>{
    const rows = parseCSV(data).slice(1);

    const extra = rows.map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer: normalize(c[4]),
      explanation:c[5]
    }));

    const q = extra[Math.floor(Math.random()*extra.length)];

    let html = `<h2>EXTRA</h2><h3>${q.q}</h3>`;

    ["A","B","C"].forEach((l,i)=>{
      html += `<button onclick="answerExtra('${l}','${q.answer}',\`${q.explanation}\`)">${q.choices[i]}</button>`;
    });

    document.getElementById("quiz").innerHTML = html;
  });
}

function answerExtra(a,ans,exp){
  if(normalize(a) === ans){
    addExp(5); // ★ここが今回のポイント
    alert("完全勝利！EXP+5");
  }else{
    alert("失敗");
  }

  location.reload();
}
</script>

</body>
</html>
