<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  margin:0;
  text-align:center;
}

/* ===== 文字色切替 ===== */
.dark{ color:#fff; }
.light{ color:#111; }

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:2px solid #8b0000;
  padding:10px;
  border-radius:10px;
  width:130px;
  z-index:9999;
  color:#fff;
}

#rankName{
  font-size:14px;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#444;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  background:#aaa;
}

/* ===== 問題カード ===== */
.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

/* ===== ゲージ ===== */
.gauge-wrap{
  width:90%;
  max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

/* ボタン */
button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

/* 選択肢 */
.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

/* 解説 */
.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
  border-left:5px solid #ff4444;
  text-align:left;
}

/* 結果 */
.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
}

/* ===== WARNING ===== */
body.alert{
  animation: flashBg 0.5s infinite;
}
@keyframes flashBg{
  0%{ background:#200; }
  50%{ background:#800; }
  100%{ background:#200; }
}

.warning{
  font-size:28px;
  color:red;
  animation: blink 0.8s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* 手紙 */
.letter{
  width:280px;
  margin:30px auto;
  padding:20px;
  background:#fdf5e6;
  color:#111;
  border:2px solid #8b0000;
}
</style>
</head>

<body class="dark">

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card light"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";
const extraUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=1390184656&single=true&output=csv";

/* ===== ランク ===== */
let currentExp = Number(localStorage.getItem("currentExp") || 0);
let playerRank = Number(localStorage.getItem("playerRank") || 1);

function getRequiredExp(rank){ return 9 + rank; }

function updateRankUI(){
  const required = getRequiredExp(playerRank);
  document.getElementById("rankName").innerText = "RANK " + playerRank;
  document.getElementById("rankText").innerText = currentExp + " / " + required;
  document.getElementById("rankBar").style.width =
    (currentExp / required) * 100 + "%";
}

function addExp(){
  currentExp++;
  let required = getRequiredExp(playerRank);

  if(currentExp >= required){
    currentExp = 0;
    playerRank++;
  }

  localStorage.setItem("playerRank", playerRank);
  localStorage.setItem("currentExp", currentExp);

  updateRankUI();
}

/* ===== クイズ ===== */
let questions = [];
let current = 0;
let score = 0;

function parseCSV(text){
  return text.trim().split("\n").map(r=>r.split(","));
}

function normalize(str){
  return (str||"").trim().toUpperCase();
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows.map(c=>({
    q:c[0],
    choices:[c[1],c[2],c[3]],
    answer: normalize(c[4]),
    explanation:c[5]
  })).slice(0,10);

  updateRankUI();
  showQuestion();
});

function updateGauge(){
  document.getElementById("gauge").style.width =
    (current / questions.length) * 100 + "%";
}

function showQuestion(){
  updateGauge();
  const q = questions[current];

  document.getElementById("quiz").innerHTML =
    `<h2>第${current+1}問：${q.q}</h2>` +
    ["A","B","C"].map((l,i)=>
      `<button onclick="answer('${l}')">${q.choices[i]}</button>`
    ).join("");
}

function answer(a){
  const q = questions[current];
  const user = normalize(a);

  let html = user===q.answer
    ? (score++, addExp(), "<h2 style='color:red;'>⭕ 正解！</h2>")
    : "<h2>❌ 不正解</h2>";

  html += `<div class="explanation-box">${q.explanation}</div>`;
  html += "<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML = html;
}

function next(){
  current++;
  if(current < questions.length){
    showQuestion();
  }else{
    document.getElementById("quiz").innerHTML =
      `<div class="result-box">
        <h2>捜査完了</h2>
        <p>${score} / 10 問正解！</p>
      </div>`;

    if(score===10){
      setTimeout(startWarning,2000);
    }
  }
}

/* ===== エクストラ ===== */
function startWarning(){
  document.body.classList.add("alert");
  document.getElementById("quiz").innerHTML =
    `<div class="warning">⚠ WARNING ⚠</div>`;
  setTimeout(showLetter,2000);
}

function showLetter(){
  document.body.classList.remove("alert");
  document.getElementById("quiz").innerHTML =
    `<div class="letter">
      <h3>📜 招待状</h3>
      <button onclick="location.reload()">挑戦</button>
    </div>`;
}
</script>

</body>
</html>
