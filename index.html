<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ごみおんせん推理録</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#1a1a1a;
  color:#fff;
  text-align:center;
  padding:15px;
  margin:0;
}

h1{
  font-size:24px;
  letter-spacing:2px;
}

.gauge-wrap{
  width:100%;
  max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  overflow:hidden;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
  transition:0.4s;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
  border:3px solid #3b2a1a;
}

button{
  display:block;
  width:100%;
  margin:8px 0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:5px;
  background:#2f2f2f;
  color:#fff;
}

button:hover{
  background:#8b0000;
}

.big-circle{
  width:100px;
  height:100px;
  border-radius:50%;
  border:8px solid #b30000;
  margin:10px auto;
}

.big-x{
  font-size:70px;
  color:#555;
}

.result-box{
  padding:20px;
  margin-top:10px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
  border-radius:10px;
}

.rank{
  font-size:28px;
  font-weight:bold;
  color:#ff4444;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz"></div>

<script>
let questions = [
  {q:"1+1は？",choices:["1","2","3"],answer:"2",explanation:"基本！"},
  {q:"3+3は？",choices:["5","6","7"],answer:"6",explanation:"簡単！"},
  {q:"5+5は？",choices:["10","11","12"],answer:"10",explanation:"OK！"}
];

let current = 0;
let score = 0;

/* 正規化 */
function normalize(str){
  return (str || "")
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-65248))
    .toLowerCase()
    .trim();
}

/* ゲージ */
function updateGauge(){
  const percent = (current / questions.length) * 100;
  document.getElementById("gauge").style.width = percent + "%";
}

/* 問題表示 */
function showQuestion(){
  updateGauge();
  const q = questions[current];

  let html = `<div class="card">
    <h2>${q.q}</h2>`;

  q.choices.forEach(c=>{
    html += `<button onclick="answer('${c}')">${c}</button>`;
  });

  html += `</div>`;
  document.getElementById("quiz").innerHTML = html;
}

/* 回答 */
function answer(a){
  const q = questions[current];
  const user = normalize(a);
  const correct = normalize(q.answer);

  let html = `<div class="card">`;

  if(user === correct){
    score++;
    html += `<div class="big-circle"></div><h2>正解！</h2>`;
  }else{
    html += `<div class="big-x">×</div><h2>不正解</h2>`;
  }

  html += `<p>${q.explanation}</p>
           <button onclick="next()">次へ</button>
           </div>`;

  document.getElementById("quiz").innerHTML = html;
}

/* 次へ */
function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    let rank = "";
    if(score === questions.length) rank = "神";
    else if(score >= 7) rank = "名探偵";
    else if(score >= 4) rank = "見習い";
    else rank = "気にしないで";

    document.getElementById("quiz").innerHTML =
      `<div class="result-box">
        <h2>捜査完了</h2>
        <p>${score} / ${questions.length}</p>
        <div class="rank">${rank}</div>
      </div>`;
  }
}

/* 初期表示 */
showQuestion();
</script>

</body>
</html>
