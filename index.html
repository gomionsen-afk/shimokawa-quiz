<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ごみおんせん推理録</title>

<style>
body{
  font-family:
    "DFKyougekiTai",
    "秀英アンチック",
    "Hiragino Mincho ProN",
    "Yu Mincho",
    serif;

  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://www.transparenttextures.com/patterns/brick-wall.png");

  color:#fff;
  text-align:center;
  padding:20px;
}

/* タイトル */
h1{
  font-size:30px;
  letter-spacing:3px;
  text-shadow:2px 2px 4px #000;
}

.subtitle{
  color:#ccc;
  margin-bottom:20px;
}

/* カード */
.card{
  background:#f4f1ea;
  color:#111;
  padding:25px;
  border-radius:5px;
  margin:20px auto;
  max-width:420px;

  border:4px solid #3b2a1a;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
  position:relative;
}

/* ラベル */
.card::before{
  content:"事件ファイル";
  position:absolute;
  top:-14px;
  left:15px;
  background:#8b0000;
  color:#fff;
  padding:4px 10px;
  font-size:12px;
  border-radius:3px;
}

/* ボタン */
button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:3px;

  background:#2f2f2f;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#8b0000;
  transform:scale(1.04);
}

.next-btn{
  background:#8b0000;
}

.next-btn:hover{
  background:#5a0000;
}

/* 結果表示 */
.correct{
  color:#8b0000;
  font-size:24px;
  font-weight:bold;
}

.wrong{
  color:#444;
  font-size:22px;
}

/* 選択肢結果 */
.choice{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}

.choice.correct{
  background:#8b0000;
  color:#fff;
}

.choice.wrong{
  background:#777;
  color:#fff;
}

/* フラッシュ演出 */
.flash{
  animation:flash 0.3s;
}
@keyframes flash{
  0%{background:#fff;}
  100%{background:transparent;}
}
</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>
<p class="subtitle">―― 真相を見抜けるか ――</p>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";

let questions = [];
let current = 0;
let score = 0;

/* CSV安全パース（カンマ対策） */
function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];

    if(char === '"'){
      inQuotes = !inQuotes;
    }else if(char === ',' && !inQuotes){
      row.push(cell);
      cell = "";
    }else if(char === '\n' && !inQuotes){
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    }else{
      cell += char;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows.map(c=>{
    return {
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer:(c[4] || "").trim().toUpperCase(), // ← バグ対策
      explanation:c[5]
    };
  });

  questions = questions.sort(()=>0.5-Math.random()).slice(0,5);
  showQuestion();
});

function showQuestion(){
  const q = questions[current];
  const div = document.getElementById("quiz");

  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  div.innerHTML = html;
}

function answer(a){
  const q = questions[current];
  const div = document.getElementById("quiz");

  const userAnswer = a.trim().toUpperCase();

  let html = "";

  if(userAnswer === q.answer){
    score++;
    html += "<div class='correct'>✔ 正解！真実は一つだ。</div>";
    div.classList.add("flash");
  }else{
    html += "<div class='wrong'>✖ 不正解…推理が甘いな</div>";
  }

  html += `<p><b>あなたの答え：</b> ${userAnswer}</p>`;
  html += `<p><b>正解：</b> ${q.answer}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    let cls = "choice";

    if(l === q.answer){
      cls += " correct";
    }else if(l === userAnswer){
      cls += " wrong";
    }

    html += `<div class="${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<p style="margin-top:10px;">${q.explanation}</p>`;
  html += "<button class='next-btn' onclick='next()'>次の事件</button>";

  div.innerHTML = html;

  setTimeout(()=>div.classList.remove("flash"),300);
}

function next(){
  current++;
  if(current<questions.length){
    showQuestion();
  }else{
    document.getElementById("quiz").innerHTML =
      `<h2>捜査終了</h2>
       <p>${score} / 5 正解</p>
       <p>
       ${score>=4?"Sランク（名探偵）":
         score>=3?"Aランク（有望）":
         score>=2?"Bランク（見習い）":
         "Cランク（修行中）"}
       </p>`;
  }
}
</script>

</body>
</html>
