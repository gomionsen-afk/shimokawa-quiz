<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  padding:12px;
  border-radius:10px;
  width:140px;
  z-index:9999;
  transition:0.5s;
}

/* ランク別進化 */
.rank1{border:2px solid #aaa;}
.rank2{border:2px solid #0f0;}
.rank3{border:2px solid #00f;}
.rank4{border:2px solid #a0f;}
.rank5{border:2px solid gold; box-shadow:0 0 10px gold;}
.rank6{border:2px solid orange; box-shadow:0 0 15px orange;}
.rank7{border:2px solid red; box-shadow:0 0 20px red;}
.rank8{border:3px double gold; box-shadow:0 0 25px gold;}

#rankName{
  font-size:14px;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#333;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  background:#aaa;
}

/* ===== UI ===== */
.card{
  background:#111;
  color:#fff;
  padding:15px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#222;
  color:#fff;
  border:none;
}

.correct{background:#8b0000;}
.wrong{background:#555;}

.explanation-box{
  background:#000;
  color:#fff;
  padding:10px;
  margin-top:10px;
  border-left:5px solid red;
}

.result-box{
  background:#000;
  padding:20px;
  border:2px solid red;
}

.rank{
  font-size:26px;
  font-weight:bold;
}

/* ===== 黒の組織風 ===== */
body.dark{
  background:#000;
}

.glitch{
  font-size:28px;
  color:red;
  animation: glitch 0.2s infinite;
}

@keyframes glitch{
  0%{transform:translate(1px,0);}
  50%{transform:translate(-1px,0);}
  100%{transform:translate(1px,0);}
}

/* 手紙 */
.letter{
  background:#111;
  border:1px solid red;
  padding:20px;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div id="quiz" class="card"></div>

<script>
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&output=csv";
const extraUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=1390184656&output=csv";

/* ===== ランク ===== */
let totalCorrect=Number(localStorage.getItem("totalCorrect")||0);
let playerRank=Number(localStorage.getItem("playerRank")||1);
let currentExp=Number(localStorage.getItem("currentExp")||0);

function getRequiredExp(rank){return 9+rank;}

function getRankColor(rank){
  if(rank<=5)return "#fff";
  if(rank<=15)return "#0f0";
  if(rank<=30)return "#0af";
  if(rank<=50)return "#a0f";
  if(rank<=100)return "#ff0";
  if(rank<=150)return "#f80";
  if(rank<=200)return "#f00";
  return "gold";
}

function getRankClass(rank){
  if(rank<6)return "rank1";
  if(rank<16)return "rank2";
  if(rank<31)return "rank3";
  if(rank<51)return "rank4";
  if(rank<101)return "rank5";
  if(rank<151)return "rank6";
  if(rank<201)return "rank7";
  return "rank8";
}

function updateRankUI(){
  const required=getRequiredExp(playerRank);
  const color=getRankColor(playerRank);

  const ui=document.getElementById("rankUI");
  ui.className="";
  ui.classList.add(getRankClass(playerRank));

  document.getElementById("rankName").innerText="RANK "+playerRank;
  document.getElementById("rankName").style.color=color;
  document.getElementById("rankText").innerText=currentExp+" / "+required;
  document.getElementById("rankBar").style.width=(currentExp/required)*100+"%";
}

function addExp(){
  currentExp++;
  totalCorrect++;

  if(currentExp>=getRequiredExp(playerRank)){
    currentExp=0;
    playerRank++;
  }

  localStorage.setItem("totalCorrect",totalCorrect);
  localStorage.setItem("playerRank",playerRank);
  localStorage.setItem("currentExp",currentExp);

  updateRankUI();
}

/* ===== クイズ ===== */
let questions=[],current=0,score=0;

function parseCSV(t){return t.split("\n").map(r=>r.split(","));}
function normalize(s){return (s||"").trim().toUpperCase();}

fetch(url).then(r=>r.text()).then(d=>{
  questions=parseCSV(d).slice(1)
    .filter(c=>c[0]&&c[4])
    .map(c=>({q:c[0],choices:[c[1],c[2],c[3]],answer:normalize(c[4]),explanation:c[5]}))
    .sort(()=>0.5-Math.random()).slice(0,10);

  updateRankUI();
  showQuestion();
});

function showQuestion(){
  const q=questions[current];
  let html=`<h2>${q.q}</h2>`;
  ["A","B","C"].forEach((l,i)=>{
    html+=`<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });
  document.getElementById("quiz").innerHTML=html;
}

function answer(a){
  const q=questions[current];
  let html="";

  if(a===q.answer){
    score++;
    addExp();
    html+="<h2>⭕ 正解</h2>";
  }else{
    html+="<h2>❌ 不正解</h2>";
  }

  html+=`<div class="explanation-box">${q.explanation}</div>`;
  html+=`<button onclick="next()">次へ</button>`;
  quiz.innerHTML=html;
}

function next(){
  current++;
  if(current<questions.length) showQuestion();
  else finish();
}

/* ===== 終了 ===== */
function finish(){
  let rankText="";

  if(score===10) rankText="名探偵";
  else if(score>=8) rankText="まあ探偵";
  else if(score>=5) rankText="眠りの小五郎";
  else if(score>=3) rankText="修行中";
  else rankText="気にしないで";

  quiz.innerHTML=`
    <div class="result-box">
      <h2>結果</h2>
      <p>${score}/10</p>
      <div class="rank">${rankText}</div>
    </div>
  `;

  if(score===10){
    setTimeout(startBlack,2000);
  }
}

/* ===== 黒の組織 ===== */
function startBlack(){
  document.body.classList.add("dark");

  quiz.innerHTML=`
    <div class="glitch">・・・見えているぞ</div>
  `;

  setTimeout(showLetter,3000);
}

function showLetter(){
  quiz.innerHTML=`
    <div class="letter">
      <h3>招待状</h3>
      <button onclick="launchExtra()">開封</button>
    </div>
  `;
}

/* ===== エクストラ ===== */
function launchExtra(){
  fetch(extraUrl).then(r=>r.text()).then(d=>{
    const rows=parseCSV(d).slice(1);
    const e=rows[Math.floor(Math.random()*rows.length)];

    quiz.innerHTML=`
      <h2>最終問題</h2>
      <p>${e[0]}</p>
      <button onclick="checkExtra('A','${e[4]}')">${e[1]}</button>
      <button onclick="checkExtra('B','${e[4]}')">${e[2]}</button>
      <button onclick="checkExtra('C','${e[4]}')">${e[3]}</button>
    `;
  });
}

function checkExtra(a,ans){
  if(a===ans){
    quiz.innerHTML="<h2>完全勝利</h2>";
  }else{
    quiz.innerHTML="<h2>失敗…</h2>";
  }
}
</script>

</body>
</html>
