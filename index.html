<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:2px solid #8b0000;
  padding:10px;
  border-radius:10px;
  width:120px;
  z-index:9999;
}

#rankName{
  font-size:14px;
  color:#ff4444;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#444;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  background:#aaa;
}

#rankText{
  font-size:12px;
}

/* ===== UI ===== */
.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

/* 選択肢 */
.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

/* 解説（白文字） */
.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
  border-left:5px solid #ff4444;
  text-align:left;
  line-height:1.6;
}

/* 結果（白文字） */
.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
}

.rank{ font-size:24px; color:#ff4444; }

.timer{ color:red; font-size:22px; }

/* WARNING */
body.alert{
  animation: flashBg 0.5s infinite;
}
@keyframes flashBg{
  0%{ background:#200; }
  50%{ background:#800; }
  100%{ background:#200; }
}

.warning{
  font-size:28px;
  color:red;
  animation: blink 0.8s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* 手紙 */
.letter{
  width:280px;
  margin:30px auto;
  padding:20px;
  background:#fdf5e6;
  color:#111;
  border:2px solid #8b0000;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<!-- ランク -->
<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";
const extraUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=1390184656&single=true&output=csv";

/* ===== ランク ===== */
let totalCorrect = Number(localStorage.getItem("totalCorrect") || 0);

function updateRankUI(){
  let rank = Math.floor(totalCorrect / 10) + 1;
  let progress = totalCorrect % 10;

  document.getElementById("rankName").innerText = "RANK " + rank;
  document.getElementById("rankText").innerText = progress + " / 10";
  document.getElementById("rankBar").style.width = (progress * 10) + "%";
}

/* ===== クイズ ===== */
let questions = [];
let current = 0;
let score = 0;

function parseCSV(text){
  return text.trim().split("\n").map(r=>r.split(","));
}

function normalize(str){
  return (str || "")
    .trim()
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-65248))
    .toUpperCase();
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows
    .filter(c => c.length>=5 && c[0] && c[4])
    .map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer: normalize(c[4]),
      explanation:c[5]
    }));

  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);

  updateRankUI();
  showQuestion();
});

function updateGauge(){
  document.getElementById("gauge").style.width =
    (current / questions.length) * 100 + "%";
}

function showQuestion(){
  updateGauge();
  const q = questions[current];

  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

/* 回答 */
function answer(a){
  const q = questions[current];
  const user = normalize(a);

  let html = "";

  if(user === q.answer){
    score++;

    totalCorrect++;
    localStorage.setItem("totalCorrect", totalCorrect);
    updateRankUI();

    html += "<h2 style='color:red;'>⭕ 正解！</h2>";
  }else{
    html += "<h2>❌ 不正解</h2>";
  }

  ["A","B","C"].forEach((l,i)=>{
    let cls="";
    if(l===q.answer) cls="correct";
    else if(l===user) cls="wrong";

    html += `<div class="choice ${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<div class="explanation-box">${q.explanation}</div>`;
  html += "<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML = html;
}

/* 次へ */
function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{

    let rank="";
    if(score===10) rank="名探偵";
    else if(score>=8) rank="まあ探偵";
    else if(score>=5) rank="眠りの小五郎";
    else if(score>=3) rank="修行中";
    else rank="気にしないで";

    document.getElementById("quiz").innerHTML =
    `<div class="result-box">
      <h2>捜査完了</h2>
      <p>${score} / 10 問正解！</p>
      <div class="rank">${rank}</div>
    </div>`;

    if(score === 10){
      setTimeout(startWarning,3000);
    }
  }
}

/* ===== エクストラ ===== */
let extraCurrent;
let timer;
let timeLeft = 30;

function startWarning(){
  document.body.classList.add("alert");

  document.getElementById("quiz").innerHTML = `
    <div class="warning">⚠ WARNING ⚠</div>
    <p>不審な通信を検知…</p>
  `;

  setTimeout(showLetter,2500);
}

function showLetter(){
  document.body.classList.remove("alert");

  document.getElementById("quiz").innerHTML = `
    <div class="letter">
      <h3>📜 招待状</h3>
      <button onclick="launchExtra()">開封する</button>
    </div>
  `;
}

function loadExtra(){
  return fetch(extraUrl)
  .then(res=>res.text())
  .then(data=>{
    const rows = parseCSV(data).slice(1);
    const extra = rows.filter(c=>c[0]&&c[4]).map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer: normalize(c[4]),
      explanation:c[5]
    }));

    return extra[Math.floor(Math.random()*extra.length)];
  });
}

function launchExtra(){
  loadExtra().then(startExtra);
}

function startExtra(q){
  extraCurrent=q;
  timeLeft=30;

  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      showFail();
    }
  },1000);

  let html=`
    <h2 style="color:red;">🚨 緊急ミッション 🚨</h2>
    <div class="timer">残り <span id="timer">30</span> 秒</div>
    <h3>${q.q}</h3>
  `;

  ["A","B","C"].forEach((l,i)=>{
    html+=`<button onclick="answerExtra('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;
}

function answerExtra(a){
  clearInterval(timer);

  const q = extraCurrent;
  const user = normalize(a);

  let html = "";

  if(user === q.answer){
    html = `<div class="result-box">
      <h2 style="color:#0f0;">完全勝利</h2>
      <p>${q.explanation}</p>
      <button onclick='location.reload()'>もう一度</button>
    </div>`;
  }else{
    html = `<div class="result-box">
      <h2 style="color:red;">失敗</h2>
      <p>正解：${q.answer}</p>
      <p>${q.explanation}</p>
      <button onclick='location.reload()'>再挑戦</button>
    </div>`;
  }

  document.getElementById("quiz").innerHTML = html;
}

function showFail(){
  document.getElementById("quiz").innerHTML =
  `<div class="result-box">
    <h2>時間切れ…</h2>
    <button onclick='location.reload()'>再挑戦</button>
  </div>`;
}
</script>

</body>
</html>
