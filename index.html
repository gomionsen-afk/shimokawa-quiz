<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== 探偵ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  width:140px;
  padding:12px;
  background:linear-gradient(#2b1a12,#120c08);
  color:#eee;
  border:2px solid #5a2a1a;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.8),
             inset 0 0 10px rgba(255,255,255,0.05);
  z-index:9999;
}

#rankName{
  font-size:14px;
  color:#ff4444;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#111;
  border:1px solid #333;
  border-radius:5px;
  margin:6px 0;
}

.rank-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#550000,#ff4444);
}

#rankText{ font-size:11px; }

/* ===== UI ===== */
.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  height:10px;
}
.gauge{ height:100%; width:0%; background:#aaa; }

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

/* 選択肢 */
.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
}

/* 結果 */
.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
}

.rank{ font-size:24px; color:#ff4444; }

/* WARNING */
body.alert{ animation:flash 0.5s infinite; }
@keyframes flash{
  0%{background:#200;}
  50%{background:#800;}
  100%{background:#200;}
}

</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "ここに通常シートURL";
const extraUrl = "ここにエクストラURL";

let questions=[],current=0,score=0;
let extraQ;

/* ===== ランク ===== */
let playerRank = Number(localStorage.getItem("rank")||1);
let exp = Number(localStorage.getItem("exp")||0);

function needExp(){ return 9 + playerRank; }

function updateRank(){
  document.getElementById("rankName").innerText="RANK "+playerRank;
  document.getElementById("rankText").innerText=exp+" / "+needExp();
  document.getElementById("rankBar").style.width=(exp/needExp()*100)+"%";
}

function addExp(){
  exp++;
  if(exp>=needExp()){
    exp=0;
    playerRank++;
  }
  localStorage.setItem("rank",playerRank);
  localStorage.setItem("exp",exp);
  updateRank();
}

/* ===== 正規化 ===== */
function normalize(s){
  return (s||"").trim().replace(/[Ａ-Ｚ]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248)).toUpperCase();
}

/* ===== 問題取得 ===== */
fetch(url).then(r=>r.text()).then(t=>{
  questions=t.split("\n").slice(1).map(r=>{
    const c=r.split(",");
    return {q:c[0],choices:[c[1],c[2],c[3]],a:normalize(c[4]),e:c[5]};
  }).filter(q=>q.q && q.a);

  questions=questions.sort(()=>0.5-Math.random()).slice(0,10);
  showQ();
});

function showQ(){
  document.getElementById("gauge").style.width=(current/10*100)+"%";
  const q=questions[current];

  let h=`<h2>${q.q}</h2>`;
  ["A","B","C"].forEach((l,i)=>{
    h+=`<button onclick="ans('${l}')">${q.choices[i]}</button>`;
  });

  quiz.innerHTML=h;
}

function ans(a){
  const q=questions[current];
  const user=normalize(a);

  let h="";

  if(user===q.a){
    score++; addExp();
    h+="<h2 style='color:red;'>⭕ 正解！</h2>";
  }else{
    h+="<h2>❌ 不正解</h2>";
  }

  h+=`<p>正解：${q.a}</p>`;
  h+=`<div class="explanation-box">${q.e}</div>`;
  h+="<button onclick='next()'>次へ</button>";

  quiz.innerHTML=h;
}

function next(){
  current++;
  if(current<10){ showQ(); }
  else{
    let rank="修行不足";
    if(score==10) rank="名探偵";
    else if(score>=8) rank="まあ探偵";
    else if(score>=5) rank="眠りの小五郎";

    quiz.innerHTML=`
    <div class="result-box">
      <h2>${score}/10</h2>
      <div class="rank">${rank}</div>
    </div>`;

    if(score==10) setTimeout(startExtra,2000);
  }
}

/* ===== エクストラ ===== */
function startExtra(){
  document.body.classList.add("alert");

  fetch(extraUrl).then(r=>r.text()).then(t=>{
    const rows=t.split("\n").slice(1);
    const r=rows[Math.floor(Math.random()*rows.length)].split(",");
    extraQ={q:r[0],choices:[r[1],r[2],r[3]],a:normalize(r[4])};
    showExtra();
  });
}

function showExtra(){
  document.body.classList.remove("alert");

  let h=`<h2 style="color:red;">🚨 緊急ミッション</h2><h3>${extraQ.q}</h3>`;
  ["A","B","C"].forEach((l,i)=>{
    h+=`<button onclick="ansExtra('${l}')">${extraQ.choices[i]}</button>`;
  });
  quiz.innerHTML=h;
}

function ansExtra(a){
  const user=normalize(a);

  if(user===extraQ.a){
    quiz.innerHTML="<h2>完全勝利🔥</h2>";
  }else{
    quiz.innerHTML="<h2>失敗…</h2>";
  }
}

updateRank();
</script>

</body>
</html>
