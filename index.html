<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:2px solid #8b0000;
  padding:10px;
  border-radius:10px;
  width:120px;
  z-index:9999;
}

#rankName{
  font-size:14px;
  color:#ff4444;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#444;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  background:#aaa;
}

#rankText{
  font-size:12px;
}

h1{ font-size:24px; }

.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#222;
  border-left:5px solid #8b0000;
  text-align:left;
}

.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
}

.rank{ font-size:24px; color:#ff4444; }
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<!-- ランクUI -->
<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";

/* ===== ランクシステム ===== */
let totalCorrect = Number(localStorage.getItem("totalCorrect") || 0);
let playerRank = Math.floor(totalCorrect / 10) + 1;

function updateRankUI(){
  playerRank = Math.floor(totalCorrect / 10) + 1;
  const progress = totalCorrect % 10;

  document.getElementById("rankName").innerText = "RANK " + playerRank;
  document.getElementById("rankText").innerText = progress + " / 10";
  document.getElementById("rankBar").style.width = (progress * 10) + "%";
}

/* ===== クイズ ===== */
let questions = [];
let current = 0;
let score = 0;

/* CSV */
function parseCSV(text){
  return text.split("\n").map(r=>r.split(","));
}

function normalize(str){
  return (str||"").trim().toUpperCase();
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows
    .filter(c => c[0] && c[4])
    .map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer: normalize(c[4]),
      explanation:c[5]
    }));

  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);

  updateRankUI();
  showQuestion();
});

/* ゲージ */
function updateGauge(){
  document.getElementById("gauge").style.width =
    (current / questions.length) * 100 + "%";
}

/* 問題 */
function showQuestion(){
  updateGauge();
  const q = questions[current];

  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

/* 回答 */
function answer(a){
  const q = questions[current];
  const user = normalize(a);

  let html = "";

  if(user === q.answer){
    score++;

    // ★ランク加算
    totalCorrect++;
    localStorage.setItem("totalCorrect", totalCorrect);
    updateRankUI();

    html += "<h2 style='color:red;'>⭕ 正解！</h2>";
  }else{
    html += "<h2>❌ 不正解</h2>";
  }

  html += `<p>あなた：${user} ／ 正解：${q.answer}</p>`;

  ["A","B","C"].forEach((l,i)=>{
    let cls="";
    if(l===q.answer) cls="correct";
    else if(l===user) cls="wrong";

    html += `<div class="choice ${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<div class="explanation-box">${q.explanation}</div>`;
  html += "<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML = html;
}

/* 次へ */
function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    document.getElementById("quiz").innerHTML =
    `<div class="result-box">
      <h2>捜査完了</h2>
      <p>${score} / 10</p>
    </div>`;
  }
}
</script>

</body>
</html>
