<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:2px solid #8b0000;
  padding:10px;
  border-radius:10px;
  width:130px;
  z-index:9999;
  transition:0.3s;
}

/* ▼ランク進化 */
.rank1{border:2px solid #aaa;}
.rank2{border:2px solid #0f0;}
.rank3{border:2px solid #00f;}
.rank4{border:2px solid #a0f;}
.rank5{border:2px solid #ff0; box-shadow:0 0 8px #ff0;}
.rank6{border:2px solid orange; box-shadow:0 0 12px orange;}
.rank7{border:2px solid red; box-shadow:0 0 15px red;}
.rank8{border:3px double gold; box-shadow:0 0 20px gold;}

#rankName{
  font-size:14px;
  font-weight:bold;
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#444;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  background:#aaa;
  transition:0.3s;
}

#rankText{
  font-size:12px;
}

/* ===== UI ===== */
.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
  border-left:5px solid #ff4444;
  text-align:left;
}

.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
}

.rank{ font-size:24px; color:#ff4444; }

.timer{ color:red; font-size:22px; }

/* WARNING */
body.alert{
  animation: flashBg 0.5s infinite;
}
@keyframes flashBg{
  0%{ background:#200; }
  50%{ background:#800; }
  100%{ background:#200; }
}

.warning{
  font-size:28px;
  color:red;
  animation: blink 0.8s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* 手紙 */
.letter{
  width:280px;
  margin:30px auto;
  padding:20px;
  background:#fdf5e6;
  color:#111;
  border:2px solid #8b0000;
}
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "そのまま";
const extraUrl = "そのまま";

/* ===== ランク ===== */
let totalCorrect = Number(localStorage.getItem("totalCorrect") || 0);
let playerRank = Number(localStorage.getItem("playerRank") || 1);
let currentExp = Number(localStorage.getItem("currentExp") || 0);

function getRequiredExp(rank){
  return 9 + rank;
}

/* ▼ランク色 */
function getRankColor(rank){
  if(rank<=5) return "#fff";
  if(rank<=15) return "#0f0";
  if(rank<=30) return "#00f";
  if(rank<=50) return "#a0f";
  if(rank<=100) return "#ff0";
  if(rank<=150) return "orange";
  if(rank<=200) return "red";
  return "gold";
}

/* ▼ランク枠 */
function getRankClass(rank){
  if(rank<=5) return "rank1";
  if(rank<=15) return "rank2";
  if(rank<=30) return "rank3";
  if(rank<=50) return "rank4";
  if(rank<=100) return "rank5";
  if(rank<=150) return "rank6";
  if(rank<=200) return "rank7";
  return "rank8";
}

function updateRankUI(){
  const required = getRequiredExp(playerRank);

  const ui = document.getElementById("rankUI");
  ui.className = "";
  ui.classList.add(getRankClass(playerRank));

  document.getElementById("rankName").innerText = "RANK " + playerRank;
  document.getElementById("rankName").style.color = getRankColor(playerRank);

  document.getElementById("rankText").innerText = currentExp + " / " + required;
  document.getElementById("rankBar").style.width =
    (currentExp / required) * 100 + "%";
}

function addExp(){
  currentExp++;
  totalCorrect++;

  if(currentExp >= getRequiredExp(playerRank)){
    currentExp = 0;
    playerRank++;
  }

  localStorage.setItem("totalCorrect", totalCorrect);
  localStorage.setItem("playerRank", playerRank);
  localStorage.setItem("currentExp", currentExp);

  updateRankUI();
}

/* ===== 以下クイズ部分（そのまま） ===== */
/* ※ここから下はあなたのコードそのままでOK */
</script>

</body>
</html>
