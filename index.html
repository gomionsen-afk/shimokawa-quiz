<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ごみおんせん推理録！</title>

<style>
body{
  font-family:"Yu Mincho",serif;
  background:linear-gradient(rgba(60,40,20,0.7),rgba(60,40,20,0.7)),
  url("https://www.transparenttextures.com/patterns/brick-wall-dark.png");
  color:#fff;
  text-align:center;
  margin:0;
}

/* ===== ランクUI ===== */
#rankUI{
  position:fixed;
  top:10px;
  right:10px;
  padding:10px;
  border-radius:10px;
  width:130px;
  z-index:9999;
  transition:0.5s;
}

#rankName{
  font-size:14px;
  font-weight:bold;
  letter-spacing:1px;
  text-shadow:0 0 5px rgba(255,255,255,0.7);
}

.rank-bar-wrap{
  width:100%;
  height:8px;
  background:#444;
  border-radius:5px;
}

.rank-bar{
  height:100%;
  width:0%;
  transition:0.3s;
}

#rankText{
  font-size:12px;
}

/* ===== UI ===== */
.gauge-wrap{
  width:90%; max-width:420px;
  margin:10px auto;
  background:#555;
  border-radius:10px;
  height:10px;
}
.gauge{
  height:100%;
  width:0%;
  background:#aaa;
}

.card{
  background:#f4f1ea;
  color:#111;
  padding:15px;
  border-radius:5px;
  margin:15px auto;
  max-width:420px;
}

button{
  width:100%;
  margin:8px 0;
  padding:14px;
  background:#2f2f2f;
  color:#fff;
  border:none;
}

.choice{ padding:10px; margin:5px; }
.correct{ background:#8b0000; color:#fff; }
.wrong{ background:#777; color:#fff; }

.explanation-box{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:#fff;
  border-left:5px solid #ff4444;
  text-align:left;
}

.result-box{
  padding:20px;
  border:3px solid #8b0000;
  background:#111;
  color:#fff;
}

.rank{ font-size:24px; color:#ff4444; }

.timer{ color:red; font-size:22px; }

/* ===== エフェクト ===== */
.glow{
  animation: glow 1.5s infinite alternate;
}
@keyframes glow{
  from{ box-shadow:0 0 5px; }
  to{ box-shadow:0 0 20px; }
}
</style>
</head>

<body>

<h1>ごみおんせん推理録!!</h1>

<div id="rankUI">
  <div id="rankName">RANK 1</div>
  <div class="rank-bar-wrap">
    <div id="rankBar" class="rank-bar"></div>
  </div>
  <div id="rankText">0 / 10</div>
</div>

<div class="gauge-wrap">
  <div id="gauge" class="gauge"></div>
</div>

<div id="quiz" class="card"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=0&single=true&output=csv";
const extraUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyDLHheyjmdZN-QobmpCdoquNfG4H1_7dzne9zSUbLqWxz13w9Dsnao3J9D6zMOtDRUiBfxROuCCBy/pub?gid=1390184656&single=true&output=csv";

/* ===== ランク ===== */
let totalCorrect = Number(localStorage.getItem("totalCorrect") || 0);
let playerRank = Number(localStorage.getItem("playerRank") || 1);
let currentExp = Number(localStorage.getItem("currentExp") || 0);

function getRequiredExp(rank){
  return 9 + rank;
}

/* 色 */
function getRankColor(rank){
  if(rank<=5) return "#ffffff";
  if(rank<=15) return "#00ff88";
  if(rank<=30) return "#00ccff";
  if(rank<=50) return "#cc66ff";
  if(rank<=100) return "#ffff44";
  if(rank<=150) return "#ff8800";
  if(rank<=200) return "#ff4444";
  return "#ffd700";
}

/* ★進化スタイル */
function getRankStyle(rank){
  if(rank<=5) return {
    bg:"#111",
    border:"2px solid #666",
    shadow:"none"
  };
  if(rank<=30) return {
    bg:"linear-gradient(#112,#000)",
    border:"2px solid #00ccff",
    shadow:"0 0 10px #00ccff"
  };
  if(rank<=100) return {
    bg:"linear-gradient(#220022,#000)",
    border:"2px solid #cc66ff",
    shadow:"0 0 15px #cc66ff"
  };
  if(rank<=200) return {
    bg:"linear-gradient(#331100,#000)",
    border:"2px solid #ff4444",
    shadow:"0 0 20px #ff4444"
  };
  return {
    bg:"linear-gradient(#332200,#000)",
    border:"3px solid gold",
    shadow:"0 0 25px gold"
  };
}

function updateRankUI(){
  const required = getRequiredExp(playerRank);

  const nameEl = document.getElementById("rankName");
  const ui = document.getElementById("rankUI");
  const bar = document.getElementById("rankBar");

  nameEl.innerText = "RANK " + playerRank;
  nameEl.style.color = getRankColor(playerRank);

  document.getElementById("rankText").innerText =
    currentExp + " / " + required;

  bar.style.width = (currentExp / required) * 100 + "%";
  bar.style.background = getRankColor(playerRank);

  /* スタイル適用 */
  const style = getRankStyle(playerRank);
  ui.style.background = style.bg;
  ui.style.border = style.border;
  ui.style.boxShadow = style.shadow;

  /* 最上位だけ発光 */
  if(playerRank >= 201){
    ui.classList.add("glow");
  }else{
    ui.classList.remove("glow");
  }
}

function addExp(){
  currentExp++;
  totalCorrect++;

  let required = getRequiredExp(playerRank);

  if(currentExp >= required){
    currentExp = 0;
    playerRank++;

    document.getElementById("quiz").innerHTML +=
      "<p style='color:gold;'>✨ RANK UP!! ✨</p>";
  }

  localStorage.setItem("totalCorrect", totalCorrect);
  localStorage.setItem("playerRank", playerRank);
  localStorage.setItem("currentExp", currentExp);

  updateRankUI();
}

/* ===== クイズ（そのまま） ===== */
let questions = [];
let current = 0;
let score = 0;

function parseCSV(text){
  return text.trim().split("\n").map(r=>r.split(","));
}

function normalize(str){
  return (str || "")
    .trim()
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-65248))
    .toUpperCase();
}

fetch(url)
.then(res=>res.text())
.then(data=>{
  const rows = parseCSV(data).slice(1);

  questions = rows
    .filter(c => c.length>=5 && c[0] && c[4])
    .map(c=>({
      q:c[0],
      choices:[c[1],c[2],c[3]],
      answer: normalize(c[4]),
      explanation:c[5]
    }));

  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);

  updateRankUI();
  showQuestion();
});

function updateGauge(){
  document.getElementById("gauge").style.width =
    (current / questions.length) * 100 + "%";
}

function showQuestion(){
  updateGauge();
  const q = questions[current];

  let html = `<h2>第${current+1}問：${q.q}</h2>`;

  ["A","B","C"].forEach((l,i)=>{
    html += `<button onclick="answer('${l}')">${q.choices[i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function answer(a){
  const q = questions[current];
  const user = normalize(a);

  let html = "";

  if(user === q.answer){
    score++;
    addExp();
    html += "<h2 style='color:red;'>⭕ 正解！</h2>";
  }else{
    html += "<h2>❌ 不正解</h2>";
  }

  ["A","B","C"].forEach((l,i)=>{
    let cls="";
    if(l===q.answer) cls="correct";
    else if(l===user) cls="wrong";

    html += `<div class="choice ${cls}">${l}: ${q.choices[i]}</div>`;
  });

  html += `<div class="explanation-box">${q.explanation}</div>`;
  html += "<button onclick='next()'>次へ</button>";

  document.getElementById("quiz").innerHTML = html;
}

function next(){
  current++;

  if(current < questions.length){
    showQuestion();
  }else{

    let rank="";
    if(score===10) rank="名探偵";
    else if(score>=8) rank="まあ探偵";
    else if(score>=5) rank="眠りの小五郎";
    else if(score>=3) rank="修行中";
    else rank="気にしないで";

    document.getElementById("quiz").innerHTML =
    `<div class="result-box">
      <h2>捜査完了</h2>
      <p>${score} / 10 問正解！</p>
      <div class="rank">${rank}</div>
    </div>`;
  }
}
</script>

</body>
</html>
